<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>小猪账本</title>

  <!-- iOS 添加到主屏幕 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="小猪账本" />
  <link rel="icon" type="image/png" sizes="180x180" href="icon-180.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />

  <!-- Android / PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#fafafa" />
  <meta name="mobile-web-app-capable" content="yes" />
  <style>
    /* ─── Apple Design System Tokens ──────────────────────────────── */
    :root {
      --bg: #fafafa;
      --surface: #f0f0f2;
      --surface-warm: #f5f5f7;
      --fg: #2c2c2e;
      --fg-2: #48484a;
      --muted: #8e8e93;
      --meta: #aeaeb2;
      --border: #e5e5ea;
      --border-soft: #eeeeef;
      --accent: #5a7fb5;
      --accent-hover: #6b8fc2;
      --accent-active: #4a6fa5;
      --accent-on: #ffffff;
      --success: #6b9e6b;
      --warn: #c4a35a;
      --danger: #c47a7a;
      --font-display: "SF Pro Display", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --font-body: "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --font-mono: "SF Mono", ui-monospace, "JetBrains Mono", Menlo, Monaco, Consolas, monospace;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --radius-pill: 980px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: var(--font-body);
      color: var(--fg);
      background: var(--bg);
      line-height: 1.47;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      /* 禁止双指缩放 + 双击缩放 */
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      /* 禁止 iOS 长按弹出菜单 */
      -webkit-touch-callout: none;
      /* 禁止页面下拉回弹（保持跟手） */
      overscroll-behavior: none;
    }
    /* 输入框允许正常选中和系统行为 */
    input, textarea {
      -webkit-user-select: text;
      user-select: text;
      -webkit-touch-callout: default;
    }

    /* ─── Layout Shell ────────────────────────────────────────────── */
    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }
    @media (min-width: 768px) {
      .app { max-width: 420px; border-left: 1px solid var(--border-soft); border-right: 1px solid var(--border-soft); }
    }

    /* ─── Header ──────────────────────────────────────────────────── */
    .header {
      padding: 16px 20px 12px;
      background: rgba(250,250,250,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.14;
    }

    /* ─── Tab Bar (bottom) ────────────────────────────────────────── */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      display: flex;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border-soft);
      padding: 6px 0 calc(6px + env(safe-area-inset-bottom, 0px));
      z-index: 100;
    }
    @media (min-width: 768px) {
      .tab-bar { max-width: 420px; }
    }
    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 0;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--meta);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-item.active { color: var(--accent); }
    .tab-item svg { width: 24px; height: 24px; }

    /* ─── Content Area ────────────────────────────────────────────── */
    .content {
      flex: 1;
      padding: 0 20px 100px;
      overflow-y: auto;
    }
    .page { display: none; }
    .page.active { display: block; }

    /* ─── Cards ───────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 12px;
    }
    .card-white {
      background: var(--bg);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      margin-bottom: 1px;
    }
    .card-white:first-child { border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
    .card-white:last-child { border-radius: 0 0 var(--radius-lg) var(--radius-lg); margin-bottom: 12px; }
    .card-white:only-child { border-radius: var(--radius-lg); margin-bottom: 12px; }

    /* ─── Typography ──────────────────────────────────────────────── */
    .section-title {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 24px 0 8px;
    }
    .balance-label {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .balance-amount {
      font-family: var(--font-display);
      font-size: 40px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .stat-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }
    .stat-card {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      padding: 14px 16px;
    }
    .stat-label {
      font-size: 12px;
      color: var(--meta);
      margin-bottom: 4px;
    }
    .stat-value {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .stat-value.income { color: var(--success); }
    .stat-value.expense { color: var(--danger); }

    /* ─── Transaction List ────────────────────────────────────────── */
    .tx-row {
      display: flex;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border-soft);
    }
    .tx-row:last-child { border-bottom: none; }
    .tx-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .tx-icon.income-icon { background: color-mix(in oklab, var(--success), transparent 88%); }
    .tx-icon.expense-icon { background: color-mix(in oklab, var(--danger), transparent 90%); }
    .tx-info { flex: 1; min-width: 0; }
    .tx-primary {
      font-size: 15px;
      font-weight: 500;
      color: var(--fg);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tx-secondary {
      font-size: 12px;
      color: var(--meta);
      margin-top: 2px;
    }
    .tx-amount {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
      margin-left: 12px;
    }
    .tx-amount.income { color: var(--success); }
    .tx-amount.expense { color: var(--fg); }

    /* ─── Swipeable Row ──────────────────────────────────────────── */
    .swipe-container {
      position: relative;
      overflow: hidden;
    }
    .swipe-actions {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      display: flex;
      align-items: stretch;
      z-index: 0;
    }
    .swipe-action-btn {
      width: 64px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .swipe-action-btn.edit-btn {
      background: var(--accent);
    }
    .swipe-action-btn.delete-btn {
      background: var(--danger);
    }
    .swipe-content {
      position: relative;
      z-index: 1;
      background: var(--bg);
      transition: transform 0.3s cubic-bezier(0.28,0,0.22,1);
    }

    /* ─── Record Form ─────────────────────────────────────────────── */
    .type-toggle {
      display: flex;
      background: var(--surface);
      border-radius: var(--radius-pill);
      padding: 3px;
      margin-bottom: 20px;
    }
    .type-btn {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: var(--radius-pill);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.28,0,0.22,1);
      background: transparent;
      color: var(--muted);
    }
    .type-btn.active {
      background: var(--bg);
      color: var(--fg);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .type-btn.active.expense-active { color: var(--danger); }
    .type-btn.active.income-active { color: var(--success); }

    .form-group { margin-bottom: 16px; }
    .form-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      display: block;
    }
    .form-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 17px;
      color: var(--fg);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent), transparent 85%); }
    .form-input::placeholder { color: var(--meta); }
    .amount-input {
      font-family: var(--font-mono);
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.02em;
      text-align: center;
      padding: 16px 14px;
      border: none;
      background: var(--surface);
      border-radius: var(--radius-md);
    }
    .amount-input:focus { background: var(--bg); border: 1px solid var(--accent); box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent), transparent 85%); }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .cat-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 4px;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      background: var(--bg);
      cursor: pointer;
      font-size: 11px;
      color: var(--muted);
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .cat-btn:hover { border-color: var(--accent); }
    .cat-btn.active {
      border-color: var(--accent);
      background: color-mix(in oklab, var(--accent), transparent 92%);
      color: var(--accent);
    }
    .cat-btn .cat-icon { font-size: 22px; }

    .submit-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius-pill);
      background: var(--accent);
      color: var(--accent-on);
      font-family: var(--font-body);
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-top: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .submit-btn:hover { background: var(--accent-hover); }
    .submit-btn:active { background: var(--accent-active); transform: scale(0.98); }
    .cancel-edit-btn {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      background: var(--bg);
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .cancel-edit-btn:hover { background: var(--surface); }

    .custom-cat-input {
      margin-top: 10px;
      padding: 10px 14px;
      border: 1px solid var(--accent);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 15px;
      color: var(--fg);
      background: var(--bg);
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .custom-cat-input::placeholder { color: var(--meta); }

    /* ─── Icon Picker (for custom category) ────────────────────────── */
    .icon-picker-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 12px;
      margin-bottom: 6px;
    }
    .icon-picker-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }
    .icon-pick-btn {
      width: 100%;
      aspect-ratio: 1;
      border: 2px solid var(--border-soft);
      border-radius: var(--radius-sm);
      background: var(--bg);
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .icon-pick-btn:hover { border-color: var(--accent); transform: scale(1.08); }
    .icon-pick-btn.active {
      border-color: var(--accent);
      background: color-mix(in oklab, var(--accent), transparent 90%);
      box-shadow: 0 0 0 2px color-mix(in oklab, var(--accent), transparent 80%);
    }
    @media (max-width: 380px) {
      .icon-picker-grid { grid-template-columns: repeat(6, 1fr); }
    }

    /* ─── Line Chart ──────────────────────────────────────────────── */
    .line-chart-wrap {
      padding: 8px 0;
    }
    .line-chart-wrap svg {
      display: block;
      width: 100%;
    }
    .line-legend {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 8px;
    }
    .line-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--fg-2);
    }
    .line-legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ─── Summary Page ────────────────────────────────────────────── */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    .month-nav button {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--fg);
      font-size: 16px;
      transition: background 0.15s;
    }
    .month-nav button:hover { background: var(--surface); }
    .month-label {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 600;
      min-width: 120px;
      text-align: center;
    }

    .summary-stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .summary-stat {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: 16px;
      text-align: center;
    }
    .summary-stat .label {
      font-size: 12px;
      color: var(--meta);
      margin-bottom: 4px;
    }
    .summary-stat .value {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    /* ─── Donut Chart ────────────────────────────────────────────── */
    .donut-chart-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
    }
    .donut-chart-wrap svg {
      display: block;
    }
    .donut-center-text {
      font-family: var(--font-display);
      font-size: 13px;
      fill: var(--muted);
    }
    .donut-center-amount {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 600;
      fill: var(--fg);
    }
    .chart-legend {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 16px;
      margin-top: 16px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--fg-2);
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .legend-label {
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .legend-pct {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--meta);
      flex-shrink: 0;
    }

    /* Category bar (kept for yearly month breakdown) */
    .cat-bar-row {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-soft);
    }
    .cat-bar-row:last-child { border-bottom: none; }
    .cat-bar-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      margin-right: 12px;
      background: var(--surface);
      flex-shrink: 0;
    }
    .cat-bar-info { flex: 1; min-width: 0; }
    .cat-bar-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--fg);
      margin-bottom: 6px;
    }
    .cat-bar-track {
      height: 6px;
      background: var(--surface);
      border-radius: 3px;
      overflow: hidden;
    }
    .cat-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--accent);
      transition: width 0.4s cubic-bezier(0.28,0,0.22,1);
    }
    .cat-bar-amount {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 500;
      color: var(--fg);
      margin-left: 12px;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    /* ─── Empty State ─────────────────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--meta);
    }
    .empty-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      opacity: 0.35;
    }
    .empty-icon svg {
      width: 100%;
      height: 100%;
    }
    .empty-text {
      font-size: 15px;
      line-height: 1.5;
    }

    /* ─── Toast ───────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: var(--fg);
      color: var(--bg);
      padding: 10px 20px;
      border-radius: var(--radius-pill);
      font-size: 14px;
      font-weight: 500;
      z-index: 200;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.28,0,0.22,1);
      pointer-events: none;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ─── Today Summary Card ────────────────────────────────────────── */
    .today-summary {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      margin-bottom: 16px;
    }
    .today-label {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 600;
      color: var(--fg);
      margin-right: 16px;
    }
    .today-stat {
      flex: 1;
      text-align: center;
    }
    .today-stat-num {
      font-family: var(--font-mono);
      font-size: 17px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      margin-bottom: 2px;
    }
    .today-stat-num.income { color: var(--success); }
    .today-stat-num.expense { color: var(--danger); }
    .today-stat-hint {
      font-size: 11px;
      color: var(--meta);
    }
    .today-divider {
      width: 1px;
      height: 32px;
      background: var(--border-soft);
    }

    /* ─── Section Label ─────────────────────────────────────────────── */
    .section-label {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 20px 0 8px;
    }

    /* ─── Record Form Wrapper ───────────────────────────────────────── */
    .record-form {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 4px;
    }

    /* ─── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 380px) {
      .category-grid { grid-template-columns: repeat(3, 1fr); }
      .balance-amount { font-size: 34px; }
      .chart-legend { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app-root"></div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;

    /* ─── Constants ─────────────────────────────────────────────────── */
    const EXPENSE_CATS = [
      { id: 'food', icon: '🍜', label: '餐饮' },
      { id: 'transport', icon: '🚇', label: '交通' },
      { id: 'shopping', icon: '🛍️', label: '购物' },
      { id: 'entertainment', icon: '🎬', label: '娱乐' },
      { id: 'housing', icon: '🏠', label: '住房' },
      { id: 'medical', icon: '💊', label: '医疗' },
      { id: 'education', icon: '📚', label: '教育' },
      { id: 'loan', icon: '🏦', label: '贷款' },
      { id: 'communication', icon: '📱', label: '通讯' },
      { id: 'clothing', icon: '👔', label: '服饰' },
      { id: 'home', icon: '🛋️', label: '居家' },
      { id: 'travel', icon: '✈️', label: '出行' },
      { id: 'social', icon: '🎁', label: '人情' },
      { id: 'smoke', icon: '🍷', label: '烟酒' },
      { id: 'pet', icon: '🐱', label: '宠物' },
      { id: 'other-exp', icon: '📦', label: '其他' },
    ];
    const INCOME_CATS = [
      { id: 'salary', icon: '💰', label: '工资' },
      { id: 'bonus', icon: '🎊', label: '奖金' },
      { id: 'invest', icon: '📈', label: '投资' },
      { id: 'freelance', icon: '💻', label: '兼职' },
      { id: 'refund', icon: '↩️', label: '退款' },
      { id: 'gift', icon: '🧧', label: '红包' },
      { id: 'finance', icon: '📊', label: '理财' },
      { id: 'reimburse', icon: '🧾', label: '报销' },
      { id: 'business', icon: '🏪', label: '经营' },
      { id: 'other-inc', icon: '💵', label: '其他' },
    ];
    const ALL_CATS = [...EXPENSE_CATS, ...INCOME_CATS];
    const CAT_MAP = Object.fromEntries(ALL_CATS.map(c => [c.id, c]));

    /* ─── Category Colors (for pie chart) ───────────────────────────── */
    const CAT_COLORS = [
      '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD',
      '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E9', '#F8C471', '#82E0AA',
      '#F1948A', '#C39BD3', '#7FB3D8', '#B0BEC5',
    ];
    // Income chart uses a different palette
    const INC_COLORS = [
      '#5a7fb5', '#6b9e6b', '#c4a35a', '#8e8e93', '#7FB3D8', '#F1948A',
      '#98D8C8', '#BB8FCE', '#85C1E9', '#B0BEC5',
    ];

    /* ─── Helpers ───────────────────────────────────────────────────── */
    function loadTx() {
      try { return JSON.parse(localStorage.getItem('ledger_tx') || '[]'); }
      catch { return []; }
    }
    function saveTx(tx) {
      localStorage.setItem('ledger_tx', JSON.stringify(tx));
    }
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2000);
    }
    function fmt(n) {
      return n.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function getMonthKey(dateStr) {
      return dateStr.slice(0, 7);
    }
    function getMonthLabel(key) {
      const [y, m] = key.split('-');
      return `${y}年${parseInt(m)}月`;
    }
    function todayStr() {
      return new Date().toISOString().slice(0, 10);
    }
    // Get display label for a category, supporting custom names
    function catDisplay(tx) {
      if (tx.customCategory) return tx.customCategory;
      const cat = CAT_MAP[tx.category];
      return cat ? cat.label : tx.category;
    }
    function catIcon(tx) {
      if (tx.customIcon) return tx.customIcon;
      const cat = CAT_MAP[tx.category];
      return cat ? cat.icon : '📦';
    }

    /* ─── Icon Components ───────────────────────────────────────────── */
    function IconOverview({ active }) {
      return (
        <svg viewBox="0 0 24 24" fill="none" stroke={active ? 'var(--accent)' : 'currentColor'} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/>
          <rect x="14" y="14" width="7" height="7" rx="1.5"/>
        </svg>
      );
    }
    function IconSummary({ active }) {
      return (
        <svg viewBox="0 0 24 24" fill="none" stroke={active ? 'var(--accent)' : 'currentColor'} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <path d="M18 20V10"/>
          <path d="M12 20V4"/>
          <path d="M6 20v-6"/>
        </svg>
      );
    }
    function IconRecord({ active }) {
      return (
        <svg viewBox="0 0 24 24" fill="none" stroke={active ? 'var(--accent)' : 'currentColor'} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
      );
    }
    function IconYear({ active }) {
      return (
        <svg viewBox="0 0 24 24" fill="none" stroke={active ? 'var(--accent)' : 'currentColor'} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      );
    }

    /* ─── SwipeableRow ──────────────────────────────────────────────── */
    function SwipeableRow({ children, onEdit, onDelete }) {
      const [swipeX, setSwipeX] = useState(0);
      const [isOpen, setIsOpen] = useState(false);
      const startX = useRef(null);
      const startY = useRef(null);
      const isDragging = useRef(false);
      const isOpenRef = useRef(false);
      const swipeXRef = useRef(0);
      const ACTION_WIDTH = 128;

      // Sync refs with state so event handlers always read latest values
      isOpenRef.current = isOpen;
      swipeXRef.current = swipeX;

      const close = useCallback(() => {
        setSwipeX(0);
        setIsOpen(false);
        startX.current = null;
        startY.current = null;
        isDragging.current = false;
      }, []);

      function handleStart(clientX, clientY) {
        startX.current = clientX;
        startY.current = clientY;
        isDragging.current = false;
      }

      function handleMove(clientX, clientY) {
        if (startX.current === null) return;
        const dx = startX.current - clientX;
        const dy = Math.abs((startY.current || clientY) - clientY);

        // Only activate horizontal swipe when it dominates vertical
        if (!isDragging.current && Math.abs(dx) > 8 && Math.abs(dx) > dy) {
          isDragging.current = true;
        }
        if (!isDragging.current) return;

        if (dx > 0) {
          setSwipeX(Math.min(dx, ACTION_WIDTH));
        } else if (isOpenRef.current) {
          setSwipeX(Math.max(ACTION_WIDTH + dx, 0));
        }
      }

      function handleEnd() {
        if (!isDragging.current && !isOpenRef.current) { close(); return; }
        if (swipeXRef.current > ACTION_WIDTH * 0.35) {
          setSwipeX(ACTION_WIDTH);
          setIsOpen(true);
        } else {
          close();
        }
      }

      // Close on outside tap when open
      useEffect(() => {
        if (!isOpen) return;
        function onTap(e) {
          if (!e.target.closest('.swipe-container')) close();
          else if (e.target.closest('.swipe-action-btn')) {
            setTimeout(close, 100);
          }
        }
        document.addEventListener('touchstart', onTap, { passive: true });
        document.addEventListener('mousedown', onTap);
        return () => {
          document.removeEventListener('touchstart', onTap);
          document.removeEventListener('mousedown', onTap);
        };
      }, [isOpen, close]);

      return (
        <div className="swipe-container">
          <div className="swipe-actions" style={{ width: ACTION_WIDTH }}>
            <button
              type="button"
              className="swipe-action-btn edit-btn"
              aria-label="编辑此记录"
              onClick={onEdit}
            >
              编辑
            </button>
            <button
              type="button"
              className="swipe-action-btn delete-btn"
              aria-label="删除此记录"
              onClick={onDelete}
            >
              删除
            </button>
          </div>
          <div
            className="swipe-content"
            style={{ transform: `translateX(-${swipeX}px)` }}
            onTouchStart={e => handleStart(e.touches[0].clientX, e.touches[0].clientY)}
            onTouchMove={e => handleMove(e.touches[0].clientX, e.touches[0].clientY)}
            onTouchEnd={handleEnd}
            onMouseDown={e => handleStart(e.clientX, e.clientY)}
            onMouseMove={e => { if (isDragging.current) handleMove(e.clientX, e.clientY); }}
            onMouseUp={handleEnd}
            onMouseLeave={handleEnd}
          >
            {children}
          </div>
        </div>
      );
    }

    /* ─── DonutChart ────────────────────────────────────────────────── */
    function DonutChart({ data, total, colors, centerLabel }) {
      const SIZE = 180;
      const STROKE = 22;
      const RADIUS = (SIZE - STROKE) / 2;
      const CENTER = SIZE / 2;
      const CIRCUMFERENCE = 2 * Math.PI * RADIUS;

      if (!data.length || total === 0) {
        return (
          <div className="donut-chart-wrap">
            <svg viewBox={`0 0 ${SIZE} ${SIZE}`} width={SIZE} height={SIZE}>
              <circle cx={CENTER} cy={CENTER} r={RADIUS} fill="none" stroke="var(--surface)" strokeWidth={STROKE} />
              <text x={CENTER} y={CENTER - 6} textAnchor="middle" className="donut-center-text">暂无数据</text>
            </svg>
          </div>
        );
      }

      let cumulative = 0;
      const slices = data.map((item, i) => {
        const pct = total > 0 ? item.amount / total : 0;
        const dash = Math.max(pct * CIRCUMFERENCE, pct > 0 ? 2 : 0); // min visible arc
        const gap = CIRCUMFERENCE - dash;
        const offset = cumulative;
        cumulative += dash;
        return { ...item, dash, gap, offset, color: colors[i % colors.length], pct };
      });

      return (
        <div className="donut-chart-wrap">
          <svg viewBox={`0 0 ${SIZE} ${SIZE}`} width={SIZE} height={SIZE}>
            {slices.map((s, i) => (
              <circle
                key={i}
                cx={CENTER}
                cy={CENTER}
                r={RADIUS}
                fill="none"
                stroke={s.color}
                strokeWidth={STROKE}
                strokeDasharray={`${s.dash} ${s.gap}`}
                strokeDashoffset={-s.offset}
                strokeLinecap="butt"
                transform={`rotate(-90 ${CENTER} ${CENTER})`}
              />
            ))}
            <text x={CENTER} y={CENTER - 8} textAnchor="middle" className="donut-center-text">{centerLabel || '总支出'}</text>
            <text x={CENTER} y={CENTER + 16} textAnchor="middle" className="donut-center-amount">¥{fmt(total)}</text>
          </svg>
          <div className="chart-legend">
            {slices.map((s, i) => (
              <div className="legend-item" key={i}>
                <span className="legend-dot" style={{ background: s.color }} />
                <span className="legend-label">{s.label}</span>
                <span className="legend-pct">{Math.round(s.pct * 100)}%</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ─── LineChart ─────────────────────────────────────────────────── */
    function LineChart({ data }) {
      const PAD = { left: 44, right: 16, top: 16, bottom: 32 };
      const W = 360, H = 200;
      const plotW = W - PAD.left - PAD.right;
      const plotH = H - PAD.top - PAD.bottom;

      if (!data.length) {
        return (
          <div className="line-chart-wrap">
            <div className="empty" style={{ padding: '24px 0' }}>
              <div className="empty-text">暂无数据</div>
            </div>
          </div>
        );
      }

      const maxVal = Math.max(
        ...data.map(d => Math.max(d.expense, d.income)),
        1
      );
      // Round up to a nice number
      const niceMax = Math.ceil(maxVal / (maxVal > 1000 ? 1000 : 100)) * (maxVal > 1000 ? 1000 : 100);
      const ticks = 4;
      const tickStep = niceMax / ticks;

      function xPos(i) { return PAD.left + (i / (data.length - 1 || 1)) * plotW; }
      function yPos(v) { return PAD.top + plotH - (v / niceMax) * plotH; }

      const expensePoints = data.map((d, i) => `${xPos(i)},${yPos(d.expense)}`).join(' ');
      const incomePoints = data.map((d, i) => `${xPos(i)},${yPos(d.income)}`).join(' ');

      // Build area fills (polygon: line + bottom edge)
      function areaPoints(linePoints, dataKey) {
        const pts = data.map((d, i) => `${xPos(i)},${yPos(d[dataKey])}`).join(' ');
        const bottom = `${xPos(data.length - 1)},${yPos(0)} ${xPos(0)},${yPos(0)}`;
        return `${pts} ${bottom}`;
      }

      function fmtY(v) {
        if (v >= 10000) return (v / 10000).toFixed(1) + 'w';
        if (v >= 1000) return (v / 1000).toFixed(1) + 'k';
        return v;
      }

      return (
        <div className="line-chart-wrap">
          <svg viewBox={`0 0 ${W} ${H}`}>
            {/* Grid lines + Y labels */}
            {Array.from({ length: ticks + 1 }, (_, i) => {
              const val = tickStep * i;
              const y = yPos(val);
              return (
                <g key={i}>
                  <line x1={PAD.left} y1={y} x2={W - PAD.right} y2={y}
                    stroke="var(--border-soft)" strokeWidth="1" strokeDasharray={i === 0 ? 'none' : '4 4'} />
                  <text x={PAD.left - 8} y={y + 4} textAnchor="end" fontSize="10" fill="var(--meta)">
                    {fmtY(val)}
                  </text>
                </g>
              );
            })}

            {/* Expense area fill */}
            <polygon
              points={areaPoints(expensePoints, 'expense')}
              fill="var(--danger)"
              opacity="0.08"
            />
            {/* Income area fill */}
            <polygon
              points={areaPoints(incomePoints, 'income')}
              fill="var(--success)"
              opacity="0.08"
            />

            {/* Grid vertical lines */}
            {data.map((_, i) => (
              <line key={i} x1={xPos(i)} y1={PAD.top} x2={xPos(i)} y2={H - PAD.bottom}
                stroke="var(--border-soft)" strokeWidth="1" strokeDasharray="2 4" />
            ))}

            {/* Expense line */}
            <polyline points={expensePoints} fill="none" stroke="var(--danger)"
              strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
            {/* Income line */}
            <polyline points={incomePoints} fill="none" stroke="var(--success)"
              strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />

            {/* Data dots */}
            {data.map((d, i) => (
              <React.Fragment key={i}>
                {d.expense > 0 && (
                  <circle cx={xPos(i)} cy={yPos(d.expense)} r="4" fill="#fff" stroke="var(--danger)" strokeWidth="2.5" />
                )}
                {d.income > 0 && (
                  <circle cx={xPos(i)} cy={yPos(d.income)} r="4" fill="#fff" stroke="var(--success)" strokeWidth="2.5" />
                )}
              </React.Fragment>
            ))}

            {/* X-axis labels */}
            {data.map((d, i) => (
              <text key={i} x={xPos(i)} y={H - 8} textAnchor="middle" fontSize="10"
                fill={d.count > 0 ? 'var(--muted)' : 'var(--meta)'}>
                {d.label}
              </text>
            ))}
          </svg>

          <div className="line-legend">
            <div className="line-legend-item">
              <span className="line-legend-dot" style={{ background: 'var(--danger)' }} />
              支出
            </div>
            <div className="line-legend-item">
              <span className="line-legend-dot" style={{ background: 'var(--success)' }} />
              收入
            </div>
          </div>
        </div>
      );
    }

    /* ─── Overview Page ─────────────────────────────────────────────── */
    function OverviewPage({ transactions, onEdit, onDelete }) {
      const now = new Date();
      const monthKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      const todayKey = todayStr();

      const monthTx = useMemo(() =>
        transactions.filter(t => getMonthKey(t.date) === monthKey),
        [transactions, monthKey]
      );

      const income = monthTx.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
      const expense = monthTx.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
      const balance = income - expense;

      const todayTx = useMemo(() =>
        transactions.filter(t => t.date === todayKey),
        [transactions, todayKey]
      );
      const todayIncome = todayTx.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
      const todayExpense = todayTx.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);

      const recent = useMemo(() =>
        [...transactions].sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id).slice(0, 8),
        [transactions]
      );

      return (
        <div>
          <div className="card" style={{ background: 'var(--fg)', color: 'var(--bg)' }}>
            <div className="balance-label" style={{ color: 'rgba(255,255,255,0.55)' }}>本月结余</div>
            <div className="balance-amount" style={{ color: '#fff' }}>
              ¥{fmt(balance)}
            </div>
            <div style={{ display: 'flex', gap: 24, marginTop: 16 }}>
              <div>
                <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.45)', marginBottom: 2 }}>收入</div>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 18, fontWeight: 600, color: 'var(--success)' }}>+¥{fmt(income)}</div>
              </div>
              <div>
                <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.45)', marginBottom: 2 }}>支出</div>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 18, fontWeight: 600, color: 'var(--danger)' }}>−¥{fmt(expense)}</div>
              </div>
            </div>
          </div>

          <div className="today-summary">
            <div className="today-label">今天</div>
            <div className="today-stat">
              <div className="today-stat-num income">+¥{fmt(todayIncome)}</div>
              <div className="today-stat-hint">收入</div>
            </div>
            <div className="today-divider" />
            <div className="today-stat">
              <div className="today-stat-num expense">−¥{fmt(todayExpense)}</div>
              <div className="today-stat-hint">支出</div>
            </div>
          </div>

          <div className="section-title">最近记录</div>
          {recent.length === 0 ? (
            <div className="empty">
              <div className="empty-icon"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M8 40V10a2 2 0 012-2h20l10 10v22a2 2 0 01-2 2H10a2 2 0 01-2-2z"/><path d="M28 8v10h10"/><path d="M16 24h16M16 30h10"/></svg></div>
              <div className="empty-text">还没有记录<br/>点击下方「记账」开始</div>
            </div>
          ) : (
            <div>
              {recent.map(tx => {
                const noteText = tx.note || catDisplay(tx);
                const subText = tx.note ? `${catDisplay(tx)} · ${tx.date.slice(5)}` : tx.date.slice(5);
                return (
                  <div className="card-white" key={tx.id} style={{ padding: 0, overflow: 'hidden' }}>
                    <SwipeableRow onEdit={() => onEdit(tx)} onDelete={() => onDelete(tx.id)}>
                      <div style={{ display: 'flex', alignItems: 'center', padding: '14px 20px' }}>
                        <div className={`tx-icon ${tx.type === 'income' ? 'income-icon' : 'expense-icon'}`}>
                          {catIcon(tx)}
                        </div>
                        <div className="tx-info">
                          <div className="tx-primary">{noteText}</div>
                          <div className="tx-secondary">{subText}</div>
                        </div>
                        <div className={`tx-amount ${tx.type}`}>
                          {tx.type === 'income' ? '+' : '−'}¥{fmt(tx.amount)}
                        </div>
                      </div>
                    </SwipeableRow>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    /* ─── Record Page ──────────────────────────────────────────────── */
    // Custom icon options for the picker
    const CUSTOM_ICONS = [
      '🛒','🎮','🏥','📱','🚗','⛽','🎓',
      '💄','👶','🐶','🎵','🏃','🎂','🎁',
      '🌸','💻','📷','🎨','✂️','🧹','🔧',
      '🎫','💊','🍺','☕','🏋️','🎣','🎲',
      '🎸','📚','✈️','🚲','🎯','🧸','🎪',
      '🌿','🎭','🔑','🛡️','🎻','🎾','🏄',
    ];

    function RecordPage({ editTx, onAdd, onUpdate, onCancelEdit }) {
      const [type, setType] = useState(editTx ? editTx.type : 'expense');
      const [amount, setAmount] = useState(editTx ? String(editTx.amount) : '');
      const [category, setCategory] = useState(editTx ? editTx.category : 'food');
      const [customCategory, setCustomCategory] = useState(
        editTx && editTx.customCategory ? editTx.customCategory : ''
      );
      const [customIcon, setCustomIcon] = useState(
        editTx && editTx.customIcon ? editTx.customIcon : ''
      );
      const [note, setNote] = useState(editTx ? (editTx.note || '') : '');
      const [date, setDate] = useState(editTx ? editTx.date : todayStr());

      const isEditing = !!editTx;
      const cats = type === 'expense' ? EXPENSE_CATS : INCOME_CATS;
      const isCustom = category === 'other-exp' || category === 'other-inc';

      // Reset category when type changes (unless editing)
      useEffect(() => {
        if (!isEditing) {
          setCategory(type === 'expense' ? 'food' : 'salary');
          setCustomCategory('');
          setCustomIcon('');
        }
      }, [type, isEditing]);

      function handleSubmit(e) {
        e.preventDefault();
        const val = parseFloat(amount);
        if (!val || val <= 0) {
          showToast('请输入金额');
          return;
        }
        if (isCustom && !customCategory.trim()) {
          showToast('请输入自定义分类名称');
          return;
        }
        const txData = {
          type,
          amount: val,
          category,
          note,
          date,
          ...(isCustom && customCategory.trim() ? { customCategory: customCategory.trim() } : {}),
          ...(isCustom && customIcon ? { customIcon } : {}),
        };
        if (isEditing) {
          onUpdate({ ...editTx, ...txData });
          showToast('记录已更新');
        } else {
          onAdd(txData);
          setAmount('');
          setNote('');
          setCustomCategory('');
          setCustomIcon('');
          showToast(type === 'expense' ? '支出已记录' : '收入已记录');
        }
      }

      function handleCancel() {
        if (isEditing) {
          onCancelEdit();
        } else {
          setAmount('');
          setNote('');
          setCustomCategory('');
          setCustomIcon('');
        }
      }

      return (
        <form onSubmit={handleSubmit}>
          {isEditing && (
            <div style={{
              background: 'color-mix(in oklab, var(--accent), transparent 90%)',
              borderRadius: 'var(--radius-md)',
              padding: '8px 14px',
              marginBottom: 16,
              fontSize: 13,
              color: 'var(--accent)',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'space-between',
            }}>
              <span>正在编辑记录</span>
              <button type="button" onClick={handleCancel}
                style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', fontSize: 13, fontWeight: 500 }}>
                取消
              </button>
            </div>
          )}

          <div className="type-toggle">
            <button type="button" className={`type-btn ${type === 'expense' ? 'active expense-active' : ''}`}
              onClick={() => { setType('expense'); if (!isEditing) { setCategory('food'); setCustomCategory(''); } }}>
              支出
            </button>
            <button type="button" className={`type-btn ${type === 'income' ? 'active income-active' : ''}`}
              onClick={() => { setType('income'); if (!isEditing) { setCategory('salary'); setCustomCategory(''); } }}>
              收入
            </button>
          </div>

          <div className="form-group">
            <label htmlFor="tx-amount" className="form-label">金额</label>
            <input
              id="tx-amount"
              type="number"
              className="form-input amount-input"
              placeholder="0.00"
              value={amount}
              onChange={e => setAmount(e.target.value)}
              step="0.01"
              min="0"
              inputMode="decimal"
              aria-required="true"
            />
          </div>

          <div className="form-group">
            <span className="form-label" id="cat-label">分类</span>
            <div className="category-grid" role="radiogroup" aria-labelledby="cat-label">
              {cats.map(c => (
                <button type="button" key={c.id}
                  role="radio"
                  aria-checked={category === c.id}
                  className={`cat-btn ${category === c.id ? 'active' : ''}`}
                  onClick={() => {
                    setCategory(c.id);
                    if (c.id !== 'other-exp' && c.id !== 'other-inc') {
                      setCustomCategory('');
                    }
                  }}>
                  <span className="cat-icon" aria-hidden="true">{c.icon}</span>
                  {c.label}
                </button>
              ))}
            </div>
            {isCustom && (
              <div>
                <input
                  type="text"
                  className="custom-cat-input"
                  placeholder="输入自定义分类名称…"
                  value={customCategory}
                  onChange={e => setCustomCategory(e.target.value)}
                  maxLength={10}
                  autoFocus
                />
                <div className="icon-picker-label">选择图标（可选）</div>
                <div className="icon-picker-grid">
                  {CUSTOM_ICONS.map(icon => (
                    <button
                      type="button"
                      key={icon}
                      className={`icon-pick-btn ${customIcon === icon ? 'active' : ''}`}
                      onClick={() => setCustomIcon(customIcon === icon ? '' : icon)}
                      aria-label={`选择图标 ${icon}`}
                    >
                      {icon}
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>

          <div className="form-group">
            <label htmlFor="tx-date" className="form-label">日期</label>
            <input id="tx-date" type="date" className="form-input" value={date} onChange={e => setDate(e.target.value)} />
          </div>

          <div className="form-group">
            <label htmlFor="tx-note" className="form-label">备注（可选）</label>
            <input id="tx-note" type="text" className="form-input" placeholder="添加备注…"
              value={note} onChange={e => setNote(e.target.value)} maxLength={50} />
          </div>

          <button type="submit" className="submit-btn">
            {isEditing ? '更新记录' : type === 'expense' ? '记录支出' : '记录收入'}
          </button>
          {isEditing && (
            <button type="button" className="cancel-edit-btn" onClick={handleCancel}>
              取消编辑
            </button>
          )}
        </form>
      );
    }

    /* ─── Summary Page ─────────────────────────────────────────────── */
    function SummaryPage({ transactions }) {
      const now = new Date();
      const [viewMonth, setViewMonth] = useState(() =>
        `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`
      );

      const monthTx = useMemo(() =>
        transactions.filter(t => getMonthKey(t.date) === viewMonth),
        [transactions, viewMonth]
      );

      const income = monthTx.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
      const expense = monthTx.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
      const count = monthTx.length;

      // Category breakdown for expenses (for pie chart)
      const expBreakdown = useMemo(() => {
        const map = {};
        monthTx.filter(t => t.type === 'expense').forEach(t => {
          const label = catDisplay(t);
          const key = t.customCategory ? t.customCategory : t.category;
          if (!map[key]) map[key] = { id: key, label, amount: 0 };
          map[key].amount += t.amount;
        });
        return Object.values(map).sort((a, b) => b.amount - a.amount);
      }, [monthTx]);

      // Income breakdown (for pie chart)
      const incBreakdown = useMemo(() => {
        const map = {};
        monthTx.filter(t => t.type === 'income').forEach(t => {
          const label = catDisplay(t);
          const key = t.customCategory ? t.customCategory : t.category;
          if (!map[key]) map[key] = { id: key, label, amount: 0 };
          map[key].amount += t.amount;
        });
        return Object.values(map).sort((a, b) => b.amount - a.amount);
      }, [monthTx]);

      function shiftMonth(delta) {
        const [y, m] = viewMonth.split('-').map(Number);
        const d = new Date(y, m - 1 + delta, 1);
        setViewMonth(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`);
      }

      return (
        <div>
          <div className="month-nav">
            <button type="button" aria-label="上个月" onClick={() => shiftMonth(-1)}>‹</button>
            <span className="month-label" aria-live="polite">{getMonthLabel(viewMonth)}</span>
            <button type="button" aria-label="下个月" onClick={() => shiftMonth(1)}>›</button>
          </div>

          <div className="summary-stat-grid">
            <div className="summary-stat">
              <div className="label">收入</div>
              <div className="value" style={{ color: 'var(--success)' }}>¥{fmt(income)}</div>
            </div>
            <div className="summary-stat">
              <div className="label">支出</div>
              <div className="value" style={{ color: 'var(--danger)' }}>¥{fmt(expense)}</div>
            </div>
            <div className="summary-stat">
              <div className="label">结余</div>
              <div className="value">¥{fmt(income - expense)}</div>
            </div>
            <div className="summary-stat">
              <div className="label">笔数</div>
              <div className="value">{count}</div>
            </div>
          </div>

          <div className="section-title">支出分类</div>
          {expBreakdown.length === 0 ? (
            <div className="empty">
              <div className="empty-icon"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M8 40V20"/><path d="M18 40V10"/><path d="M28 40V16"/><path d="M38 40V6"/></svg></div>
              <div className="empty-text">本月暂无支出记录</div>
            </div>
          ) : (
            <DonutChart data={expBreakdown} total={expense} colors={CAT_COLORS} centerLabel="总支出" />
          )}

          {incBreakdown.length > 0 && (
            <>
              <div className="section-title">收入分类</div>
              <DonutChart data={incBreakdown} total={income} colors={INC_COLORS} centerLabel="总收入" />
            </>
          )}
        </div>
      );
    }

    /* ─── Yearly Page ──────────────────────────────────────────────── */
    function YearlyPage({ transactions }) {
      const now = new Date();
      const [viewYear, setViewYear] = useState(now.getFullYear());

      const yearTx = useMemo(() =>
        transactions.filter(t => {
          const y = parseInt(t.date.slice(0, 4));
          return y === viewYear;
        }),
        [transactions, viewYear]
      );

      const income = yearTx.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
      const expense = yearTx.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
      const count = yearTx.length;

      // Monthly breakdown for the year
      const monthBreakdown = useMemo(() => {
        const months = Array.from({ length: 12 }, (_, i) => {
          const key = `${viewYear}-${String(i + 1).padStart(2, '0')}`;
          const tx = yearTx.filter(t => getMonthKey(t.date) === key);
          return {
            month: i + 1,
            label: `${i + 1}月`,
            income: tx.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0),
            expense: tx.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0),
            count: tx.length,
          };
        });
        return months;
      }, [yearTx, viewYear]);

      // Category breakdown for expenses (pie chart)
      const expBreakdown = useMemo(() => {
        const map = {};
        yearTx.filter(t => t.type === 'expense').forEach(t => {
          const label = catDisplay(t);
          const key = t.customCategory ? t.customCategory : t.category;
          if (!map[key]) map[key] = { id: key, label, amount: 0 };
          map[key].amount += t.amount;
        });
        return Object.values(map).sort((a, b) => b.amount - a.amount);
      }, [yearTx]);

      // Income breakdown (pie chart)
      const incBreakdown = useMemo(() => {
        const map = {};
        yearTx.filter(t => t.type === 'income').forEach(t => {
          const label = catDisplay(t);
          const key = t.customCategory ? t.customCategory : t.category;
          if (!map[key]) map[key] = { id: key, label, amount: 0 };
          map[key].amount += t.amount;
        });
        return Object.values(map).sort((a, b) => b.amount - a.amount);
      }, [yearTx]);

      const activeMonths = monthBreakdown.filter(m => m.count > 0);

      return (
        <div>
          <div className="month-nav">
            <button type="button" aria-label="上一年" onClick={() => setViewYear(y => y - 1)}>‹</button>
            <span className="month-label" aria-live="polite">{viewYear}年</span>
            <button type="button" aria-label="下一年" onClick={() => setViewYear(y => y + 1)}>›</button>
          </div>

          <div className="summary-stat-grid">
            <div className="summary-stat">
              <div className="label">收入</div>
              <div className="value" style={{ color: 'var(--success)' }}>¥{fmt(income)}</div>
            </div>
            <div className="summary-stat">
              <div className="label">支出</div>
              <div className="value" style={{ color: 'var(--danger)' }}>¥{fmt(expense)}</div>
            </div>
            <div className="summary-stat">
              <div className="label">结余</div>
              <div className="value">¥{fmt(income - expense)}</div>
            </div>
            <div className="summary-stat">
              <div className="label">笔数</div>
              <div className="value">{count}</div>
            </div>
          </div>

          <div className="section-title">月度分布</div>
          {activeMonths.length === 0 ? (
            <div className="empty">
              <div className="empty-icon"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M8 40V10a2 2 0 012-2h20l10 10v22a2 2 0 01-2 2H10a2 2 0 01-2-2z"/><path d="M28 8v10h10"/><path d="M16 24h16M16 30h10"/></svg></div>
              <div className="empty-text">{viewYear}年暂无记录</div>
            </div>
          ) : (
            <div className="card" style={{ padding: '12px 8px' }}>
              <LineChart data={monthBreakdown} />
            </div>
          )}

          <div className="section-title">年度支出分类</div>
          {expBreakdown.length === 0 ? (
            <div className="empty">
              <div className="empty-icon"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M8 40V20"/><path d="M18 40V10"/><path d="M28 40V16"/><path d="M38 40V6"/></svg></div>
              <div className="empty-text">暂无支出记录</div>
            </div>
          ) : (
            <DonutChart data={expBreakdown} total={expense} colors={CAT_COLORS} centerLabel="总支出" />
          )}

          {incBreakdown.length > 0 && (
            <>
              <div className="section-title">年度收入分类</div>
              <DonutChart data={incBreakdown} total={income} colors={INC_COLORS} centerLabel="总收入" />
            </>
          )}
        </div>
      );
    }

    /* ─── App Shell ────────────────────────────────────────────────── */
    function App() {
      const [tab, setTab] = useState('overview');
      const [transactions, setTransactions] = useState(loadTx);
      const [editingTx, setEditingTx] = useState(null);

      useEffect(() => { saveTx(transactions); }, [transactions]);

      const addTx = useCallback((tx) => {
        setTransactions(prev => [...prev, { ...tx, id: Date.now() }]);
      }, []);

      const updateTx = useCallback((updatedTx) => {
        setTransactions(prev => prev.map(t => t.id === updatedTx.id ? updatedTx : t));
        setEditingTx(null);
        setTab('overview');
      }, []);

      const deleteTx = useCallback((id) => {
        setTransactions(prev => prev.filter(t => t.id !== id));
        showToast('已删除');
      }, []);

      const handleEdit = useCallback((tx) => {
        setEditingTx(tx);
        setTab('record');
      }, []);

      const handleCancelEdit = useCallback(() => {
        setEditingTx(null);
        setTab('overview');
      }, []);

      const headerTitles = { overview: '小猪账本', record: '记一笔', summary: '月度', yearly: '年度' };
      const headerTitle = headerTitles[tab];

      return (
        <React.Fragment>
          <div className="header">
            <h1>{headerTitle}</h1>
          </div>

          <div className="content">
            <div role="tabpanel" className={`page ${tab === 'overview' ? 'active' : ''}`}>
              <OverviewPage transactions={transactions} onEdit={handleEdit} onDelete={deleteTx} />
            </div>
            <div role="tabpanel" className={`page ${tab === 'record' ? 'active' : ''}`}>
              <RecordPage
                editTx={editingTx}
                onAdd={addTx}
                onUpdate={updateTx}
                onCancelEdit={handleCancelEdit}
              />
            </div>
            <div role="tabpanel" className={`page ${tab === 'summary' ? 'active' : ''}`}>
              <SummaryPage transactions={transactions} />
            </div>
            <div role="tabpanel" className={`page ${tab === 'yearly' ? 'active' : ''}`}>
              <YearlyPage transactions={transactions} />
            </div>
          </div>

          <nav className="tab-bar" role="tablist" aria-label="主导航">
            <button role="tab" aria-selected={tab === 'overview'} className={`tab-item ${tab === 'overview' ? 'active' : ''}`} onClick={() => { setTab('overview'); setEditingTx(null); }}>
              <IconOverview active={tab === 'overview'} />
              <span>概览</span>
            </button>
            <button role="tab" aria-selected={tab === 'record'} className={`tab-item ${tab === 'record' ? 'active' : ''}`} onClick={() => setTab('record')}>
              <IconRecord active={tab === 'record'} />
              <span>记账</span>
            </button>
            <button role="tab" aria-selected={tab === 'summary'} className={`tab-item ${tab === 'summary' ? 'active' : ''}`} onClick={() => { setTab('summary'); setEditingTx(null); }}>
              <IconSummary active={tab === 'summary'} />
              <span>月度</span>
            </button>
            <button role="tab" aria-selected={tab === 'yearly'} className={`tab-item ${tab === 'yearly' ? 'active' : ''}`} onClick={() => { setTab('yearly'); setEditingTx(null); }}>
              <IconYear active={tab === 'yearly'} />
              <span>年度</span>
            </button>
          </nav>
        </React.Fragment>
      );
    }

    /* ─── Mount ────────────────────────────────────────────────────── */
    const root = ReactDOM.createRoot(document.getElementById('app-root'));
    root.render(<App />);
  </script>
</body>
</html>
