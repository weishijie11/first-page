<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6b8fc2"/>
      <stop offset="100%" stop-color="#3d5f8f"/>
    </linearGradient>
    <!-- Subtle glow behind the ¥ -->
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.4">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background rounded rect (iOS style) -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Subtle center glow -->
  <circle cx="512" cy="480" r="350" fill="url(#glow)"/>

  <!-- ¥ symbol — white, bold strokes -->
  <g stroke="white" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left diagonal arm -->
    <line x1="270" y1="280" x2="512" y2="460"/>
    <!-- Right diagonal arm -->
    <line x1="754" y1="280" x2="512" y2="460"/>
    <!-- Vertical stem -->
    <line x1="512" y1="460" x2="512" y2="710"/>
    <!-- Upper horizontal bar -->
    <line x1="310" y1="380" x2="714" y2="380"/>
    <!-- Lower horizontal bar -->
    <line x1="350" y1="550" x2="674" y2="550"/>
  </g>
</svg>
