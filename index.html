<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>记账本</title>
  <style>
    /* ─── Apple Design System Tokens ──────────────────────────────── */
    :root {
      --bg: #fafafa;
      --surface: #f0f0f2;
      --surface-warm: #f5f5f7;
      --fg: #2c2c2e;
      --fg-2: #48484a;
      --muted: #8e8e93;
      --meta: #aeaeb2;
      --border: #e5e5ea;
      --border-soft: #eeeeef;
      --accent: #5a7fb5;
      --accent-hover: #6b8fc2;
      --accent-active: #4a6fa5;
      --accent-on: #ffffff;
      --success: #6b9e6b;
      --warn: #c4a35a;
      --danger: #c47a7a;
      --font-display: "SF Pro Display", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --font-body: "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --font-mono: "SF Mono", ui-monospace, "JetBrains Mono", Menlo, Monaco, Consolas, monospace;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --radius-pill: 980px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: var(--font-body);
      color: var(--fg);
      background: var(--bg);
      line-height: 1.47;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ─── Layout Shell ────────────────────────────────────────────── */
    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }
    @media (min-width: 768px) {
      .app { max-width: 420px; border-left: 1px solid var(--border-soft); border-right: 1px solid var(--border-soft); }
    }

    /* ─── Header ──────────────────────────────────────────────────── */
    .header {
      padding: 16px 20px 12px;
      background: rgba(250,250,250,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.14;
    }

    /* ─── Tab Bar (bottom) ────────────────────────────────────────── */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      display: flex;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border-soft);
      padding: 6px 0 calc(6px + env(safe-area-inset-bottom, 0px));
      z-index: 100;
    }
    @media (min-width: 768px) {
      .tab-bar { max-width: 420px; }
    }
    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 0;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--meta);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-item.active { color: var(--accent); }
    .tab-item svg { width: 24px; height: 24px; }

    /* ─── Content Area ────────────────────────────────────────────── */
    .content {
      flex: 1;
      padding: 0 20px 100px;
      overflow-y: auto;
    }
    .page { display: none; }
    .page.active { display: block; }

    /* ─── Cards ───────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 12px;
    }
    .card-white {
      background: var(--bg);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      margin-bottom: 1px;
    }
    .card-white:first-child { border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
    .card-white:last-child { border-radius: 0 0 var(--radius-lg) var(--radius-lg); margin-bottom: 12px; }
    .card-white:only-child { border-radius: var(--radius-lg); margin-bottom: 12px; }

    /* ─── Typography ──────────────────────────────────────────────── */
    .section-title {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 24px 0 8px;
    }
    .balance-label {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .balance-amount {
      font-family: var(--font-display);
      font-size: 40px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .stat-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }
    .stat-card {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      padding: 14px 16px;
    }
    .stat-label {
      font-size: 12px;
      color: var(--meta);
      margin-bottom: 4px;
    }
    .stat-value {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .stat-value.income { color: var(--success); }
    .stat-value.expense { color: var(--danger); }

    /* ─── Transaction List ────────────────────────────────────────── */
    .tx-row {
      display: flex;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border-soft);
    }
    .tx-row:last-child { border-bottom: none; }
    .tx-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .tx-icon.income-icon { background: color-mix(in oklab, var(--success), transparent 88%); }
    .tx-icon.expense-icon { background: color-mix(in oklab, var(--danger), transparent 90%); }
    .tx-info { flex: 1; min-width: 0; }
    .tx-category {
      font-size: 15px;
      font-weight: 500;
      color: var(--fg);
    }
    .tx-note {
      font-size: 13px;
      color: var(--meta);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tx-amount {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
      margin-left: 12px;
    }
    .tx-amount.income { color: var(--success); }
    .tx-amount.expense { color: var(--fg); }

    /* ─── Record Form ─────────────────────────────────────────────── */
    .type-toggle {
      display: flex;
      background: var(--surface);
      border-radius: var(--radius-pill);
      padding: 3px;
      margin-bottom: 20px;
    }
    .type-btn {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: var(--radius-pill);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.28,0,0.22,1);
      background: transparent;
      color: var(--muted);
    }
    .type-btn.active {
      background: var(--bg);
      color: var(--fg);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .type-btn.active.expense-active { color: var(--danger); }
    .type-btn.active.income-active { color: var(--success); }

    .form-group { margin-bottom: 16px; }
    .form-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      display: block;
    }
    .form-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 17px;
      color: var(--fg);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent), transparent 85%); }
    .form-input::placeholder { color: var(--meta); }
    .amount-input {
      font-family: var(--font-mono);
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.02em;
      text-align: center;
      padding: 16px 14px;
      border: none;
      background: var(--surface);
      border-radius: var(--radius-md);
    }
    .amount-input:focus { background: var(--bg); border: 1px solid var(--accent); box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent), transparent 85%); }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .cat-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 12px 4px;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      background: var(--bg);
      cursor: pointer;
      font-size: 11px;
      color: var(--muted);
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .cat-btn:hover { border-color: var(--accent); }
    .cat-btn.active {
      border-color: var(--accent);
      background: color-mix(in oklab, var(--accent), transparent 92%);
      color: var(--accent);
    }
    .cat-btn .cat-icon { font-size: 22px; }

    .submit-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius-pill);
      background: var(--accent);
      color: var(--accent-on);
      font-family: var(--font-body);
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-top: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .submit-btn:hover { background: var(--accent-hover); }
    .submit-btn:active { background: var(--accent-active); transform: scale(0.98); }

    /* ─── Summary Page ────────────────────────────────────────────── */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    .month-nav button {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--fg);
      font-size: 16px;
      transition: background 0.15s;
    }
    .month-nav button:hover { background: var(--surface); }
    .month-label {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 600;
      min-width: 120px;
      text-align: center;
    }

    .summary-stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .summary-stat {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: 16px;
      text-align: center;
    }
    .summary-stat .label {
      font-size: 12px;
      color: var(--meta);
      margin-bottom: 4px;
    }
    .summary-stat .value {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    /* Category bar */
    .cat-bar-row {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-soft);
    }
    .cat-bar-row:last-child { border-bottom: none; }
    .cat-bar-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      margin-right: 12px;
      background: var(--surface);
      flex-shrink: 0;
    }
    .cat-bar-info { flex: 1; min-width: 0; }
    .cat-bar-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--fg);
      margin-bottom: 6px;
    }
    .cat-bar-track {
      height: 6px;
      background: var(--surface);
      border-radius: 3px;
      overflow: hidden;
    }
    .cat-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--accent);
      transition: width 0.4s cubic-bezier(0.28,0,0.22,1);
    }
    .cat-bar-amount {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 500;
      color: var(--fg);
      margin-left: 12px;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    /* ─── Empty State ─────────────────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--meta);
    }
    .empty-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      opacity: 0.35;
    }
    .empty-icon svg {
      width: 100%;
      height: 100%;
    }
    .empty-text {
      font-size: 15px;
      line-height: 1.5;
    }

    /* ─── Toast ───────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: var(--fg);
      color: var(--bg);
      padding: 10px 20px;
      border-radius: var(--radius-pill);
      font-size: 14px;
      font-weight: 500;
      z-index: 200;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.28,0,0.22,1);
      pointer-events: none;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ─── Delete Button ───────────────────────────────────────────── */
    .tx-delete {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--meta);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 8px;
      font-size: 14px;
      transition: all 0.15s;
      flex-shrink: 0;
      opacity: 0;
    }
    .tx-row:hover .tx-delete { opacity: 1; }
    .tx-delete:hover { background: color-mix(in oklab, var(--danger), transparent 90%); color: var(--danger); }
    @media (hover: none) {
      .tx-delete { opacity: 1; }
    }

    /* ─── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 380px) {
      .category-grid { grid-template-columns: repeat(3, 1fr); }
      .balance-amount { font-size: 34px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app-root"></div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    /* ─── Constants ─────────────────────────────────────────────────── */
    const EXPENSE_CATS = [
      { id: 'food', icon: '🍜', label: '餐饮' },
      { id: 'transport', icon: '🚇', label: '交通' },
      { id: 'shopping', icon: '🛍️', label: '购物' },
      { id: 'entertainment', icon: '🎬', label: '娱乐' },
      { id: 'housing', icon: '🏠', label: '住房' },
      { id: 'medical', icon: '💊', label: '医疗' },
      { id: 'education', icon: '📚', label: '教育' },
      { id: 'other-exp', icon: '📦', label: '其他' },
    ];
    const INCOME_CATS = [
      { id: 'salary', icon: '💰', label: '工资' },
      { id: 'bonus', icon: '🎁', label: '奖金' },
      { id: 'invest', icon: '📈', label: '投资' },
      { id: 'freelance', icon: '💻', label: '兼职' },
      { id: 'refund', icon: '↩️', label: '退款' },
      { id: 'gift', icon: '🧧', label: '红包' },
      { id: 'other-inc', icon: '💵', label: '其他' },
    ];
    const ALL_CATS = [...EXPENSE_CATS, ...INCOME_CATS];
    const CAT_MAP = Object.fromEntries(ALL_CATS.map(c => [c.id, c]));

    /* ─── Helpers ───────────────────────────────────────────────────── */
    function loadTx() {
      try { return JSON.parse(localStorage.getItem('ledger_tx') || '[]'); }
      catch { return []; }
    }
    function saveTx(tx) {
      localStorage.setItem('ledger_tx', JSON.stringify(tx));
    }
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2000);
    }
    function fmt(n) {
      return n.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function getMonthKey(dateStr) {
      return dateStr.slice(0, 7); // "2026-06"
    }
    function getMonthLabel(key) {
      const [y, m] = key.split('-');
      return `${y}年${parseInt(m)}月`;
    }
    function todayStr() {
      return new Date().toISOString().slice(0, 10);
    }

    /* ─── Icon Components ───────────────────────────────────────────── */
    function IconOverview({ active }) {
      return (
        <svg viewBox="0 0 24 24" fill="none" stroke={active ? 'var(--accent)' : 'currentColor'} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/>
          <rect x="14" y="14" width="7" height="7" rx="1.5"/>
        </svg>
      );
    }
    function IconRecord({ active }) {
      return (
        <svg viewBox="0 0 24 24" fill="none" stroke={active ? 'var(--accent)' : 'currentColor'} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <line x1="12" y1="8" x2="12" y2="16"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
      );
    }
    function IconSummary({ active }) {
      return (
        <svg viewBox="0 0 24 24" fill="none" stroke={active ? 'var(--accent)' : 'currentColor'} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <path d="M18 20V10"/>
          <path d="M12 20V4"/>
          <path d="M6 20v-6"/>
        </svg>
      );
    }

    /* ─── Overview Page ─────────────────────────────────────────────── */
    function OverviewPage({ transactions, onDelete }) {
      const now = new Date();
      const monthKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

      const monthTx = useMemo(() =>
        transactions.filter(t => getMonthKey(t.date) === monthKey),
        [transactions, monthKey]
      );

      const income = monthTx.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
      const expense = monthTx.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
      const balance = income - expense;

      const recent = useMemo(() =>
        [...transactions].sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id).slice(0, 8),
        [transactions]
      );

      return (
        <div>
          <div className="card" style={{ background: 'var(--fg)', color: 'var(--bg)' }}>
            <div className="balance-label" style={{ color: 'rgba(255,255,255,0.55)' }}>本月结余</div>
            <div className="balance-amount" style={{ color: '#fff' }}>
              ¥{fmt(balance)}
            </div>
            <div style={{ display: 'flex', gap: 24, marginTop: 16 }}>
              <div>
                <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.45)', marginBottom: 2 }}>收入</div>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 18, fontWeight: 600, color: 'var(--success)' }}>+¥{fmt(income)}</div>
              </div>
              <div>
                <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.45)', marginBottom: 2 }}>支出</div>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 18, fontWeight: 600, color: 'var(--danger)' }}>−¥{fmt(expense)}</div>
              </div>
            </div>
          </div>

          <div className="section-title">最近记录</div>
          {recent.length === 0 ? (
            <div className="empty">
              <div className="empty-icon"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M8 40V10a2 2 0 012-2h20l10 10v22a2 2 0 01-2 2H10a2 2 0 01-2-2z"/><path d="M28 8v10h10"/><path d="M16 24h16M16 30h10"/></svg></div>
              <div className="empty-text">还没有记录<br/>点击下方「记一笔」开始</div>
            </div>
          ) : (
            <div>
              {recent.map(tx => {
                const cat = CAT_MAP[tx.category];
                return (
                  <div className="card-white" key={tx.id} style={{ display: 'flex', alignItems: 'center', padding: '14px 20px' }}>
                    <div className={`tx-icon ${tx.type === 'income' ? 'income-icon' : 'expense-icon'}`}>
                      {cat?.icon || '📦'}
                    </div>
                    <div className="tx-info">
                      <div className="tx-category">{cat?.label || tx.category}</div>
                      <div className="tx-note">{tx.note || tx.date}</div>
                    </div>
                    <div className={`tx-amount ${tx.type}`}>
                      {tx.type === 'income' ? '+' : '−'}¥{fmt(tx.amount)}
                    </div>
                    <button type="button" className="tx-delete" aria-label="删除此记录" onClick={() => onDelete(tx.id)}>×</button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    /* ─── Record Page ──────────────────────────────────────────────── */
    function RecordPage({ onAdd }) {
      const [type, setType] = useState('expense');
      const [amount, setAmount] = useState('');
      const [category, setCategory] = useState('food');
      const [note, setNote] = useState('');
      const [date, setDate] = useState(todayStr());

      const cats = type === 'expense' ? EXPENSE_CATS : INCOME_CATS;

      function handleSubmit(e) {
        e.preventDefault();
        const val = parseFloat(amount);
        if (!val || val <= 0) {
          showToast('请输入金额');
          return;
        }
        onAdd({ type, amount: val, category, note, date });
        setAmount('');
        setNote('');
        showToast(type === 'expense' ? '支出已记录' : '收入已记录');
      }

      return (
        <form onSubmit={handleSubmit}>
          <div className="type-toggle">
            <button type="button" className={`type-btn ${type === 'expense' ? 'active expense-active' : ''}`}
              onClick={() => { setType('expense'); setCategory('food'); }}>
              支出
            </button>
            <button type="button" className={`type-btn ${type === 'income' ? 'active income-active' : ''}`}
              onClick={() => { setType('income'); setCategory('salary'); }}>
              收入
            </button>
          </div>

          <div className="form-group">
            <label htmlFor="tx-amount" className="form-label">金额</label>
            <input
              id="tx-amount"
              type="number"
              className="form-input amount-input"
              placeholder="0.00"
              value={amount}
              onChange={e => setAmount(e.target.value)}
              step="0.01"
              min="0"
              inputMode="decimal"
              aria-required="true"
            />
          </div>

          <div className="form-group">
            <span className="form-label" id="cat-label">分类</span>
            <div className="category-grid" role="radiogroup" aria-labelledby="cat-label">
              {cats.map(c => (
                <button type="button" key={c.id}
                  role="radio"
                  aria-checked={category === c.id}
                  className={`cat-btn ${category === c.id ? 'active' : ''}`}
                  onClick={() => setCategory(c.id)}>
                  <span className="cat-icon" aria-hidden="true">{c.icon}</span>
                  {c.label}
                </button>
              ))}
            </div>
          </div>

          <div className="form-group">
            <label htmlFor="tx-date" className="form-label">日期</label>
            <input id="tx-date" type="date" className="form-input" value={date} onChange={e => setDate(e.target.value)} />
          </div>

          <div className="form-group">
            <label htmlFor="tx-note" className="form-label">备注（可选）</label>
            <input id="tx-note" type="text" className="form-input" placeholder="添加备注…"
              value={note} onChange={e => setNote(e.target.value)} maxLength={50} />
          </div>

          <button type="submit" className="submit-btn">
            {type === 'expense' ? '记录支出' : '记录收入'}
          </button>
        </form>
      );
    }

    /* ─── Summary Page ─────────────────────────────────────────────── */
    function SummaryPage({ transactions }) {
      const now = new Date();
      const [viewMonth, setViewMonth] = useState(() =>
        `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`
      );

      const monthTx = useMemo(() =>
        transactions.filter(t => getMonthKey(t.date) === viewMonth),
        [transactions, viewMonth]
      );

      const income = monthTx.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
      const expense = monthTx.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
      const count = monthTx.length;

      // Category breakdown for expenses
      const catBreakdown = useMemo(() => {
        const map = {};
        monthTx.filter(t => t.type === 'expense').forEach(t => {
          map[t.category] = (map[t.category] || 0) + t.amount;
        });
        return Object.entries(map)
          .map(([id, amount]) => ({ ...CAT_MAP[id], amount }))
          .sort((a, b) => b.amount - a.amount);
      }, [monthTx]);

      const maxCatAmount = catBreakdown.length > 0 ? catBreakdown[0].amount : 1;

      // Navigate months
      function shiftMonth(delta) {
        const [y, m] = viewMonth.split('-').map(Number);
        const d = new Date(y, m - 1 + delta, 1);
        setViewMonth(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`);
      }

      return (
        <div>
          <div className="month-nav">
            <button type="button" aria-label="上个月" onClick={() => shiftMonth(-1)}>‹</button>
            <span className="month-label" aria-live="polite">{getMonthLabel(viewMonth)}</span>
            <button type="button" aria-label="下个月" onClick={() => shiftMonth(1)}>›</button>
          </div>

          <div className="summary-stat-grid">
            <div className="summary-stat">
              <div className="label">收入</div>
              <div className="value" style={{ color: 'var(--success)' }}>¥{fmt(income)}</div>
            </div>
            <div className="summary-stat">
              <div className="label">支出</div>
              <div className="value" style={{ color: 'var(--danger)' }}>¥{fmt(expense)}</div>
            </div>
            <div className="summary-stat">
              <div className="label">结余</div>
              <div className="value">¥{fmt(income - expense)}</div>
            </div>
            <div className="summary-stat">
              <div className="label">笔数</div>
              <div className="value">{count}</div>
            </div>
          </div>

          <div className="section-title">支出分类</div>
          {catBreakdown.length === 0 ? (
            <div className="empty">
              <div className="empty-icon"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M8 40V20"/><path d="M18 40V10"/><path d="M28 40V16"/><path d="M38 40V6"/></svg></div>
              <div className="empty-text">本月暂无支出记录</div>
            </div>
          ) : (
            <div className="card" style={{ padding: '4px 20px' }}>
              {catBreakdown.map(cat => (
                <div className="cat-bar-row" key={cat.id}>
                  <div className="cat-bar-icon">{cat.icon}</div>
                  <div className="cat-bar-info">
                    <div className="cat-bar-name">{cat.label}</div>
                    <div className="cat-bar-track">
                      <div className="cat-bar-fill" style={{ width: `${(cat.amount / maxCatAmount) * 100}%` }} />
                    </div>
                  </div>
                  <div className="cat-bar-amount">¥{fmt(cat.amount)}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    /* ─── App Shell ────────────────────────────────────────────────── */
    function App() {
      const [tab, setTab] = useState('overview');
      const [transactions, setTransactions] = useState(loadTx);

      useEffect(() => { saveTx(transactions); }, [transactions]);

      const addTx = useCallback((tx) => {
        setTransactions(prev => [...prev, { ...tx, id: Date.now() }]);
      }, []);

      const deleteTx = useCallback((id) => {
        setTransactions(prev => prev.filter(t => t.id !== id));
        showToast('已删除');
      }, []);

      const headerTitle = tab === 'overview' ? '记账本' : tab === 'record' ? '记一笔' : '汇总';

      return (
        <React.Fragment>
          <div className="header">
            <h1>{headerTitle}</h1>
          </div>

          <div className="content">
            <div role="tabpanel" className={`page ${tab === 'overview' ? 'active' : ''}`}>
              <OverviewPage transactions={transactions} onDelete={deleteTx} />
            </div>
            <div role="tabpanel" className={`page ${tab === 'record' ? 'active' : ''}`}>
              <RecordPage onAdd={addTx} />
            </div>
            <div role="tabpanel" className={`page ${tab === 'summary' ? 'active' : ''}`}>
              <SummaryPage transactions={transactions} />
            </div>
          </div>

          <nav className="tab-bar" role="tablist" aria-label="主导航">
            <button role="tab" aria-selected={tab === 'overview'} className={`tab-item ${tab === 'overview' ? 'active' : ''}`} onClick={() => setTab('overview')}>
              <IconOverview active={tab === 'overview'} />
              <span>概览</span>
            </button>
            <button role="tab" aria-selected={tab === 'record'} className={`tab-item ${tab === 'record' ? 'active' : ''}`} onClick={() => setTab('record')}>
              <IconRecord active={tab === 'record'} />
              <span>记一笔</span>
            </button>
            <button role="tab" aria-selected={tab === 'summary'} className={`tab-item ${tab === 'summary' ? 'active' : ''}`} onClick={() => setTab('summary')}>
              <IconSummary active={tab === 'summary'} />
              <span>汇总</span>
            </button>
          </nav>
        </React.Fragment>
      );
    }

    /* ─── Mount ────────────────────────────────────────────────────── */
    const root = ReactDOM.createRoot(document.getElementById('app-root'));
    root.render(<App />);
  </script>
</body>
</html>
