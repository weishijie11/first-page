<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试页面</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 48px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      text-align: center;
    }
    h1 { font-size: 28px; color: #333; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 24px; line-height: 1.6; }
    button {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 12px 32px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(102, 126, 234, 0.5);
    }
    button:active { transform: translateY(0); }
    #counter { font-size: 48px; font-weight: bold; color: #667eea; margin: 16px 0; }
    #time { color: #999; font-size: 14px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎉 测试页面</h1>
    <p>这是一个简单的 HTML 测试页面，用来验证浏览器渲染和基本交互。</p>
    <div id="counter">0</div>
    <button onclick="increment()">点我 +1</button>
    <div id="time"></div>
  </div>

  <script>
    let count = 0;
    function increment() {
      count++;
      document.getElementById('counter').textContent = count;
    }
    document.getElementById('time').textContent =
      '加载时间: ' + new Date().toLocaleString();
  </script>
</body>
</html>
